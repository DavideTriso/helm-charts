# Default values for WordPress Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## WordPress image configuration
wordpress:
  image:
    repository: wordpress
    tag: "6.7-php8.3-fpm-alpine"
    pullPolicy: IfNotPresent
  
  ## WordPress configuration
  config:
    ## Site URL - should match your ingress host
    siteUrl: "https://chart-example.local"
    
    ## WordPress table prefix
    tablePrefix: "wp_"
    
    ## Extra WordPress configuration to add to wp-config.php
    ## See: https://wordpress.org/documentation/article/editing-wp-config-php/
    extraConfig: |
      define('WP_CACHE', true);
      define('DISALLOW_FILE_EDIT', true);
      define('MEDIA_TRASH', true);
      define('WP_POST_REVISIONS', 10);
      define('WP_MEMORY_LIMIT', '256M');
      define('WP_MAX_MEMORY_LIMIT', '512M');
  
  ## WordPress persistent storage
  persistence:
    enabled: true
    ## Storage class for PVC
    # storageClass: ""
    ## Existing claim to use (if not set, a new one will be created)
    # existingClaim: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  
  ## WordPress resource requests and limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

## Nginx web server configuration
nginx:
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  
  ## Nginx resource requests and limits
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

## MySQL database configuration
mysql:
  enabled: true
  
  image:
    repository: mysql
    tag: "8.4"
    pullPolicy: IfNotPresent
  
  ## MySQL authentication
  auth:
    ## Root password (change in production!)
    rootPassword: "changeme"
    ## WordPress database name
    database: "wordpress"
    ## WordPress database user
    username: "wordpress"
    ## WordPress database password (change in production!)
    password: "wordpress"
  
  ## MySQL persistent storage
  persistence:
    enabled: true
    # storageClass: ""
    # existingClaim: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  
  ## MySQL resource requests and limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  ## MySQL configuration
  config:
    ## MySQL character set and collation
    characterSet: "utf8mb4"
    collation: "utf8mb4_unicode_ci"

## External MySQL configuration
## Used when mysql.enabled is false
externalDatabase:
  host: "mysql.default.svc.cluster.local"
  port: 3306
  database: "wordpress"
  username: "wordpress"
  password: "wordpress"

## Number of WordPress pod replicas
replicaCount: 1

## Image pull secrets
imagePullSecrets: []

## Override chart name
nameOverride: ""
fullnameOverride: ""

## ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

## Pod annotations
podAnnotations: {}

## Pod labels
podLabels: {}

## Pod security context
podSecurityContext:
  fsGroup: 33
  runAsUser: 33
  runAsGroup: 33
  runAsNonRoot: true

## Security context for containers
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 33

## Service configuration
service:
  type: ClusterIP
  port: 80
  annotations: {}

## Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wordpress-tls
      hosts:
        - chart-example.local

## Liveness probe configuration
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

## Readiness probe configuration
readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

## Startup probe configuration
startupProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

## Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

## Node selector
nodeSelector: {}

## Tolerations
tolerations: []

## Affinity rules
affinity: {}
