# Example values for using external MySQL database
# Use this when you want to use an existing MySQL instance
# instead of deploying MySQL in the cluster

## Disable bundled MySQL
mysql:
  enabled: false

## Configure external database connection
externalDatabase:
  ## Database host (can be external or in-cluster)
  host: "mysql.database.svc.cluster.local"
  ## Or use an external host:
  # host: "mysql.example.com"
  
  port: 3306
  
  ## Database name
  database: "wordpress"
  
  ## Database user
  username: "wordpress_user"
  
  ## Database password
  ## IMPORTANT: In production, use Kubernetes Secrets instead!
  password: "CHANGE-ME-TO-SECURE-PASSWORD"

## WordPress configuration
wordpress:
  config:
    siteUrl: "https://myblog.example.com"
  
  persistence:
    enabled: true
    size: 10Gi
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

## Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: myblog.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myblog-example-com-tls
      hosts:
        - myblog.example.com

---
# Alternative: Using Kubernetes Secret for database password
# Create the secret first:
#
# kubectl create secret generic wordpress-db-secret \
#   --from-literal=password='YOUR-SECURE-PASSWORD'
#
# Then reference it in your values:
#
# externalDatabase:
#   host: "mysql.example.com"
#   port: 3306
#   database: "wordpress"
#   username: "wordpress_user"
#   # Reference the secret instead of plain text password
#   passwordSecret:
#     name: wordpress-db-secret
#     key: password
