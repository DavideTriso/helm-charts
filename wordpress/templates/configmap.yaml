---
# ConfigMap for WP-CLI script
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wordpress.fullname" . }}-wpcli
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
data:
  wp: |-
    #!/bin/sh
    WP_PATH=/var/www/html/
    CLI=/tmp/wp-cli.phar
    if ! [ -f "$CLI" ]; then
        curl -sS https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar -o $CLI
    fi
    php $CLI --path=$WP_PATH "$@"

---
# ConfigMap for WordPress configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wordpress.fullname" . }}-config
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
data:
  # PHP-FPM configuration
  zz-docker.conf: |-
    [global]
    daemonize = no

    [www]
    listen = 127.0.0.1:9000
    pm = dynamic
    pm.max_children = 50
    pm.start_servers = 5
    pm.min_spare_servers = 5
    pm.max_spare_servers = 35
    pm.max_requests = 500

  # PHP uploads configuration
  uploads.ini: |-
    ; Maximum amount of memory a script may consume
    memory_limit = 256M
    
    ; Maximum number of files allowed to be uploaded simultaneously
    max_file_uploads = 50
    
    ; Maximum size of an uploaded file
    upload_max_filesize = 128M
    
    ; Sets max size of post data allowed
    post_max_size = 128M
    
    ; Maximum time in seconds a script is allowed to run
    max_execution_time = 300
    
    ; Maximum time in seconds a script is allowed to parse input data
    max_input_time = 600

  # PHP OPcache configuration
  opcache-recommended.ini: |-
    opcache.enable=1
    opcache.memory_consumption=128
    opcache.interned_strings_buffer=8
    opcache.max_accelerated_files=10000
    opcache.validate_timestamps=1
    opcache.revalidate_freq=60
    opcache.save_comments=1

  # Nginx configuration
  nginx.conf: |-
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
      multi_accept on;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      server_tokens off;

      # Gzip Settings
      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_types text/plain text/css text/xml text/javascript 
                 application/json application/javascript application/xml+rss 
                 application/rss+xml font/truetype font/opentype 
                 application/vnd.ms-fontobject image/svg+xml;

      client_max_body_size 128M;

      server {
        listen 8080;
        server_name _;

        root /var/www/html;
        index index.php index.html index.htm;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # WordPress permalinks
        location / {
          try_files $uri $uri/ /index.php?$args;
        }

        # Deny access to sensitive files
        location ~ /\. {
          deny all;
          access_log off;
          log_not_found off;
        }

        location ~ /wp-config.php {
          deny all;
          access_log off;
          log_not_found off;
        }

        # Deny execution of PHP files in uploads directory
        location ~* /(?:uploads|files)/.*\.php$ {
          deny all;
          access_log off;
          log_not_found off;
        }

        # Deny access to load-scripts.php and load-styles.php
        location ~ /wp-admin/load-(scripts|styles)\.php {
          deny all;
          access_log off;
          log_not_found off;
        }

        # Handle PHP files
        location ~ \.php$ {
          try_files $uri =404;
          fastcgi_split_path_info ^(.+\.php)(/.+)$;
          fastcgi_pass 127.0.0.1:9000;
          fastcgi_index index.php;
          include fastcgi_params;
          fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
          fastcgi_param PATH_INFO $fastcgi_path_info;
          fastcgi_param HTTPS on;
          fastcgi_param HTTP_SCHEME https;
          fastcgi_buffering off;
        }

        # Cache static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
          access_log off;
        }
      }
    }

  # WordPress extra configuration
  wp-config-extra.php: |-
    <?php
    {{ .Values.wordpress.config.extraConfig | nindent 4 }}
