apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordpress.fullname" . }}
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "wordpress.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wordpress.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # Copy WordPress source files to shared volume
        - name: copy-wordpress
          image: "{{ .Values.wordpress.image.repository }}:{{ .Values.wordpress.image.tag }}"
          imagePullPolicy: {{ .Values.wordpress.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Copying WordPress source files..."
              if [ ! -f /var/www/html/wp-config.php ]; then
                cp -rp /usr/src/wordpress/* /var/www/html/
              fi
              if [ -z "$(ls -A /var/www/html/wp-content)" ]; then
                echo "Copying initial wp-content..."
                cp -rp /usr/src/wordpress/wp-content/* /var/www/html/wp-content/
              fi
              echo "WordPress files ready"
          volumeMounts:
            - name: wordpress-files
              mountPath: /var/www/html
            - name: wordpress-data
              mountPath: /var/www/html/wp-content
              subPath: wp-content
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      containers:
        # WordPress PHP-FPM container
        - name: wordpress
          image: "{{ .Values.wordpress.image.repository }}:{{ .Values.wordpress.image.tag }}"
          imagePullPolicy: {{ .Values.wordpress.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: WORDPRESS_DB_HOST
              value: {{ include "wordpress.mysql.host" . | quote }}
            - name: WORDPRESS_DB_NAME
              value: {{ include "wordpress.mysql.database" . | quote }}
            - name: WORDPRESS_DB_USER
              value: {{ include "wordpress.mysql.username" . | quote }}
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.mysql.secretName" . }}
                  key: mysql-password
            - name: WORDPRESS_TABLE_PREFIX
              value: {{ .Values.wordpress.config.tablePrefix | quote }}
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                {{ .Values.wordpress.config.extraConfig | nindent 16 }}
          ports:
            - name: php-fpm
              containerPort: 9000
              protocol: TCP
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: php-fpm
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: php-fpm
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            tcpSocket:
              port: php-fpm
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
          {{- end }}
          volumeMounts:
            - name: wordpress-files
              mountPath: /var/www/html
            - name: wordpress-data
              mountPath: /var/www/html/wp-content
              subPath: wp-content
            - name: config
              mountPath: /usr/local/etc/php-fpm.d/zz-docker.conf
              subPath: zz-docker.conf
            - name: config
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
            - name: config
              mountPath: /usr/local/etc/php/conf.d/opcache-recommended.ini
              subPath: opcache-recommended.ini
            - name: wpcli
              mountPath: /usr/local/bin/wp
              subPath: wp
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Make wp-config.php read-only after it's created
                    if [ -f /var/www/html/wp-config.php ]; then
                      chmod 444 /var/www/html/wp-config.php
                    fi
          resources:
            {{- toYaml .Values.wordpress.resources | nindent 12 }}
        # Nginx web server container
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /readme.html
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /readme.html
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /readme.html
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
          {{- end }}
          volumeMounts:
            - name: wordpress-files
              mountPath: /var/www/html
              readOnly: true
            - name: wordpress-data
              mountPath: /var/www/html/wp-content
              subPath: wp-content
              readOnly: true
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
      volumes:
        - name: wordpress-files
          emptyDir: {}
        - name: wordpress-data
          {{- if .Values.wordpress.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.wordpress.persistence.existingClaim | default (printf "%s-data" (include "wordpress.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "wordpress.fullname" . }}-config
        - name: wpcli
          configMap:
            name: {{ include "wordpress.fullname" . }}-wpcli
            defaultMode: 0755
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
